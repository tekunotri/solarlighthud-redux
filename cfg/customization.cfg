//HEALTH
//Sets up changes to the HP, doesn't reload HUD.

//Setup, ignore (if you copy paste this to edit a new element, change the .txt)
alias hudplayerhealth_clear "sixense_clear_bindings; sixense_write_bindings hud_hudplayerhealth.txt"
alias hudplayerhealth_log "con_filter_text #base; con_filter_enable 1; con_logfile cfg/hud_hudplayerhealth.txt"
alias hudplayerhealth_unlog "con_logfile console.log"

//Actual changes
alias hudplayerhealth_classic "hudplayerhealth_clear; hudplayerhealth_log; exec hud/hudplayerhealth_classic.cfg; hudplayerhealth_unlog"
alias hudplayerhealth_center "hudplayerhealth_clear; hudplayerhealth_log; exec hud/hudplayerhealth_center.cfg; hudplayerhealth_unlog"
alias hudplayerhealth_def "hudplayerhealth_clear"

