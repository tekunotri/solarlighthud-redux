//Aliases that are run when clicking the buttons. Loads the aliases above, often in groups, then reloads the HUD.
//I removed hud_reloadscheme from the other parts of the script, so we don't run the command more than once.

//HP-Ammo
alias ClassicHPAmmo "hudplayerhealth_classic; hudammoweapons_classic; hudhealthaccount_classic; hudmeters_classic; hudcounters_classic; hud_reloadscheme"
alias CenterHPAmmo "hudplayerhealth_center; hudammoweapons_center; hudhealthaccount_center; hudmeters_center; hudcounters_center; hud_reloadscheme"
alias DefaultHPAmmo "hudplayerhealth_clear; hudammoweapons_clear; hudhealthaccount_clear; hudmeters_default; hudcounters_clear; hud_reloadscheme"

//PASSTIME
alias DefaultPassTime "hudpasstimeballstatus_clear; hudpasstimeteamscore_clear; hud_reloadscheme"
alias 4v4PassTime "hudpasstimeballstatus_4v4; hudpasstimeteamscore_4v4; hud_reloadscheme"
alias BallOnlyPassTime "hudpasstimeballstatus_ballonly; hudpasstimeteamscore_ballonly; hud_reloadscheme"


// Execute first HUD launch setup
alias "redux_firstrun" "exec redux_firstrun"
exec redux_customization/redux_setup.txt
redux_firstrun
