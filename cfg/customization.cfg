//Aliases that are run when clicking the buttons. Loads the aliases above, often in groups, then reloads the HUD.
//I removed hud_reloadscheme from the other parts of the script, so we don't run the command more than once.

//HP-Ammo
alias ClassicHPAmmo "hudplayerhealth_classic; hudammoweapons_classic; hudmediccharge_classic; hudhealthaccount_classic; hudmeters_classic; hudcounters_classic; disguisestatuspanel_centered; hud_reloadscheme"
alias ClassicerHPAmmo "hudplayerhealth_classicer; hudammoweapons_classicer; hudmediccharge_classic; hudhealthaccount_classic; hudmeters_classic; hudcounters_classic; disguisestatuspanel_centered; hud_reloadscheme"
alias CenterHPAmmo "hudplayerhealth_center; hudammoweapons_center; hudmediccharge_center; hudhealthaccount_center; hudmeters_center; hudcounters_center; disguisestatuspanel_centered; hud_reloadscheme"
alias DefaultHPAmmo "hudplayerhealth_clear; hudammoweapons_clear; hudmediccharge_def; hudhealthaccount_clear; hudmeters_default; hudcounters_clear; disguisestatuspanel_clear; hud_reloadscheme"

