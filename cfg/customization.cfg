
//makes it so i dont have to make a unlog alias for every single element
alias "console_unlog" "con_logfile console.log"

//HEALTH
//Sets up changes to the HP, doesn't reload HUD.

//Setup, ignore (if you copy paste this to edit a new element, change the .txt)
alias hudplayerhealth_clear "sixense_clear_bindings; sixense_write_bindings redux_customization/hud_hudplayerhealth.txt"
alias hudplayerhealth_log "con_logfile cfg/redux_customization/hud_hudplayerhealth.txt"

//Actual changes
alias hudplayerhealth_classic "hudplayerhealth_clear; hudplayerhealth_log; echo "#base ../../custom/solarlighthud-redux/resource/ui/redux_customization/health/hudplayerhealth_classic.res"; console_unlog"
alias hudplayerhealth_center "hudplayerhealth_clear; hudplayerhealth_log; echo "#base ../../custom/solarlighthud-redux/resource/ui/redux_customization/health/hudplayerhealth_center.res"; console_unlog"
alias hudplayerhealth_def "hudplayerhealth_clear"

