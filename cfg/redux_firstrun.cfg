//player might want to know where the find a game button was moved to. show a backpack hint for A-D navigation. clear other tutorials in case this is a fresh TF2 install for some reason

tf_find_a_match_hint_viewed 0
tf_explanations_backpackpanel 0
tf_explanations_charinfo_armory_panel 1
tf_explanations_charinfopanel 1
tf_explanations_craftingpanel 1
tf_explanations_discardpanel 1
tf_explanations_store 1
tf_warpaint_explanation_viewed 1

cl_hud_minmode 0 

//hide the console because someone got softlocked when it was open
hideconsole

//basically from m0rehud, no need to reinvent the wheel
//dont show timestamp when printing console messages
con_timestamp "0"

//create folder and cfg backup to restore to
alias "create_folder" "host_writeconfig redux_temporary_cfg_backup.cfg full; ds_dir cfg/redux_customization; ds_log 0; ds_record; ds_stop; exec redux_temporary_cfg_backup.cfg"
create_folder


con_logfile "cfg/redux_customization/redux_setup.txt"
echo "alias redux_firstrun"
con_logfile	"console.log"